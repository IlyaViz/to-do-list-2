services:
  test-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-tests:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      test-db:
        condition: service_healthy
    env_file:
      - .env.test
    environment:
      POSTGRES_HOST: test-db
      POSTGRES_PORT: 5432
    command: ["pytest"]
    volumes:
      - ./backend:/app