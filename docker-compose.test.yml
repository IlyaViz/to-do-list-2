services:
  test-db:
    image: postgres:16-alpine
    env_file:
      - .env.test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-tests:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      test-db:
        condition: service_healthy
    env_file:
      - .env.test
    command: ["pytest"]

  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      test-db:
        condition: service_healthy
    env_file:
      - .env.test

  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - test-backend
    env_file:
      - .env.test

  e2e-tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile.dev
    depends_on:
      - test-frontend
    env_file:
      - .env.test