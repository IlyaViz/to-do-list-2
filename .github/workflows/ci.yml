name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests (Pytest & Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Backend Tests
        run: |
          docker-compose -f docker-compose.test.yml up --exit-code-from backend-tests --build backend-tests

      - name: Run E2E Tests
        run: |
          docker-compose -f docker-compose.test.yml up --exit-code-from e2e-tests --build e2e-tests
